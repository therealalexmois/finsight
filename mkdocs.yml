site_name: FinSight
site_description: REST API для интеграции с Tinkoff Invest и предсказания движения акций.
site_author: Aleksander Moiseenko
repo_url: https://github.com/therealalexmois/finsight
repo_name: therealalexmois/finsight
docs_dir: docs
edit_uri: edit/main/docs/

theme:
  name: material
  language: ru
  features:
    - navigation.instant
    - navigation.tracking
    - navigation.top
    - navigation.sections
    - toc.follow
    - search.suggest
    - search.highlight
    - content.code.copy
    - content.action.edit
  palette:
    - media: '(prefers-color-scheme: light)'
      scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/weather-night
        name: Тёмная тема
    - media: '(prefers-color-scheme: dark)'
      scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/weather-sunny
        name: Светлая тема

nav:
  - Главная: index.md
  - Архитектура: architecture.md
  - RFC:
      - Проектирование системы: rfc/system_design.md

plugins:
  - search:
      lang: ru
  - mkdocstrings:
      handlers:
        python:
          paths: [src]
          options:
            docstring_style: google
            show_source: true
            show_root_heading: true

markdown_extensions:
  - admonition
  - attr_list
  - tables
  - toc:
      permalink: true
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.superfences
  - pymdownx.details
  - pymdownx.tabbed:
      alternate_style: true
