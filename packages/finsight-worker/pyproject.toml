[project]
name = "finsight-worker"
version = "1.0.0"
description = "Celery-воркер FinSight: фоновые задачи загрузки исторических данных."
authors = [{ name = "Aleksander Moiseenko", email = "alex.mois.developer@gmail.com" }]
license = "MIT"
requires-python = ">=3.13,<4"
dependencies = [
  "finsight-core",
  "celery==5.6.3",
  "redis==8.0.0",
  "typer==0.26.7",
  "click==8.4.1",
  "structlog==26.1.0",
  "orjson==3.11.9",
  "dependency-injector==4.49.0",
  "pydantic==2.13.4",
  "pydantic-settings==2.14.1",
]

[project.scripts]
finsight-worker = "finsight_worker.cli.main:cli"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["finsight_worker"]

[tool.uv.sources]
finsight-core = { workspace = true }
