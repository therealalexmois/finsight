[project]
name = "finsight-api"
version = "1.0.0"
description = "REST API FinSight: интеграция с Tinkoff Invest и предсказания движения акций."
authors = [{ name = "Aleksander Moiseenko", email = "alex.mois.developer@gmail.com" }]
license = "MIT"
requires-python = ">=3.13,<4"
dependencies = [
  "finsight-core",
  "fastapi==0.136.3",
  "pydantic[email]==2.13.4",
  "pydantic-settings==2.14.1",
  "structlog==26.1.0",
  "uvicorn==0.49.0",
  "orjson==3.11.9",
  "dependency-injector==4.49.0",
  "t-tech-investments==1.49.0",
  "click==8.4.1",
  "typer==0.26.7",
  "httpx==0.28.1",
  "rich==15.0.0",
]

[project.scripts]
finsight-api = "finsight_api.cli.main:cli"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["finsight_api"]

[tool.uv.sources]
finsight-core = { workspace = true }
